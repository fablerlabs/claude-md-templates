name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Plugin structure + JSON checks
        run: node test/check.mjs
      - name: claude plugin validate
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate .
